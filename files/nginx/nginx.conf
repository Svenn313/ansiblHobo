user www-data;

worker_processes auto;  # Utilise autant de workers que de cœurs CPU
worker_rlimit_nofile 65535;  # Permet un grand nombre de fichiers ouverts

events {
    worker_connections 2048;  # Nombre de connexions par worker
    multi_accept on;  # Permet d'accepter plusieurs connexions en même temps
}

http {
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                      '$status $body_bytes_sent "$http_referer" '
                      '"$http_user_agent" "$http_x_forwarded_for"';

    # Sécurisation générale des en-têtes HTTP
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Augmenter la taille du hachage des en-têtes proxy
    proxy_headers_hash_max_size 2048;
    proxy_headers_hash_bucket_size 128;

    # Définir une zone partagée pour limiter le nombre de connexions par adresse IP
    limit_conn_zone $remote_addr zone=addr:10m;

    access_log /var/log/nginx/access.log main;
    error_log /var/log/nginx/error.log warn;

    # Configuration de cache et d'en-têtes de sécurité
    server_tokens off;  # Ne pas exposer la version Nginx

    include /etc/nginx/sites-enabled/*;
}
